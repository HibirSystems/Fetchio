name: fetchio
description: A production-grade cross-platform media downloader
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Unique IDs for local download items
  uuid: ^4.4.0

  # Local storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.0
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.6
  share_plus: ^8.0.3
  path_provider: ^2.1.3
  open_file: ^3.3.2
  permission_handler: ^11.3.1
  package_info_plus: ^8.0.0
  connectivity_plus: ^6.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    # yt-dlp + ffmpeg binaries (downloaded by scripts/download_binaries.sh before build)
    - assets/binaries/arm64-v8a/
    - assets/binaries/armeabi-v7a/
    - assets/binaries/x86_64/
