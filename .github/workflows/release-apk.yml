name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Production APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Decode keystore
        working-directory: frontend/android/app
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > release.jks

      - name: Create key.properties
        working-directory: frontend/android
        run: |
          cat > key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Build release APK
        working-directory: frontend
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          # Strip leading 'v' for --build-name (e.g. v1.2.3 -> 1.2.3)
          BUILD_NAME="${VERSION#v}"
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.PRODUCTION_API_URL }} \
            --build-name="$BUILD_NAME" \
            --build-number="${{ github.run_number }}"

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          mv frontend/build/app/outputs/flutter-apk/app-release.apk \
             frontend/build/app/outputs/flutter-apk/fetchio-${VERSION}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fetchio ${{ steps.version.outputs.tag }}
          body: |
            ## Fetchio ${{ steps.version.outputs.tag }}

            ### Installation
            1. Download `fetchio-*.apk` below
            2. On your Android device, enable **Install unknown apps** for your browser or file manager
            3. Open the downloaded APK and tap **Install**

            ### What's in this release
            - Production build targeting the configured API server
            - ProGuard-optimised and resource-shrunk APK
            - Supports Android 5.0 (API 21) and above

            ### Configuration
            The app connects to the production API automatically.
            You can override the API URL anytime in **Settings → API Configuration → API Base URL**.
          files: frontend/build/app/outputs/flutter-apk/fetchio-*.apk
          draft: false
          prerelease: false
