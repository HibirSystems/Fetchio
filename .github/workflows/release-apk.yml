name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Production APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Download compatibility yt-dlp binary
        working-directory: frontend
        run: SKIP_FFMPEG=1 bash scripts/download_binaries.sh

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android/app
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Create key.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: |
          cat > key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.jks
          EOF

      - name: Build release APK
        working-directory: frontend
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BUILD_NAME="${VERSION#v}"
          if [ -f "android/key.properties" ]; then
            flutter build apk --release \
              --split-per-abi \
              --build-name="$BUILD_NAME" \
              --build-number="${{ github.run_number }}"
          else
            flutter build apk --debug \
              --build-name="$BUILD_NAME" \
              --build-number="${{ github.run_number }}"
          fi

      - name: Prepare APK artifacts
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          OUT_DIR="frontend/build/app/outputs/flutter-apk"

          if ls "$OUT_DIR"/*-release.apk >/dev/null 2>&1; then
            for apk in "$OUT_DIR"/*-release.apk; do
              name="$(basename "$apk")"
              abi="${name#app-}"
              abi="${abi%-release.apk}"
              cp "$apk" "$OUT_DIR/fetchio-${VERSION}-${abi}.apk"
            done
          else
            cp "$OUT_DIR/app-debug.apk" "$OUT_DIR/fetchio-${VERSION}-debug.apk"
          fi

      - name: Verify APK outputs
        run: |
          OUT_DIR="frontend/build/app/outputs/flutter-apk"
          echo "Generated APK files:"
          ls -lah "$OUT_DIR"
          count=$(ls "$OUT_DIR"/fetchio-*.apk 2>/dev/null | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "ERROR: No release artifacts matching fetchio-*.apk were generated."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fetchio ${{ steps.version.outputs.tag }}
          body: |
            ## Fetchio ${{ steps.version.outputs.tag }}

            ### What's new
            - **Smaller APKs** with per-ABI release outputs.
            - Includes a built-in compatibility yt-dlp engine for devices that block executing downloaded binaries.
            - yt-dlp can still be updated from **Settings** after install.
            - Downloads are saved to the device Downloads / Gallery automatically.
            - Supports Android 7.0 (API 24) and above.

            ### Installation
            1. Download `fetchio-*.apk` below
            2. On your Android device, enable **Install unknown apps** for your browser or file manager
            3. Open the downloaded APK and tap **Install**

            ### Notes
            - If your device blocks executable files in app storage, the bundled compatibility engine is used automatically.
            - Choose the APK matching your device ABI for the smallest download size.
          files: frontend/build/app/outputs/flutter-apk/fetchio-*.apk
          draft: false
          prerelease: false
