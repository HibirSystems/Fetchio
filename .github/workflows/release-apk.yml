name: Build & Release APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-apk:
    name: Build Production APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.x'
          channel: stable
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend
        run: flutter pub get

      - name: Download yt-dlp + ffmpeg binaries
        working-directory: frontend
        run: bash scripts/download_binaries.sh

      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android/app
        run: echo "$KEYSTORE_BASE64" | base64 --decode > release.jks

      - name: Create key.properties
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: frontend/android
        run: |
          cat > key.properties << 'EOF'
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=app/release.jks
          EOF

      - name: Build release APK
        working-directory: frontend
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          BUILD_NAME="${VERSION#v}"
          if [ -f "android/key.properties" ]; then
            flutter build apk --release \
              --build-name="$BUILD_NAME" \
              --build-number="${{ github.run_number }}"
          else
            flutter build apk --debug \
              --build-name="$BUILD_NAME" \
              --build-number="${{ github.run_number }}"
          fi

      - name: Rename APK
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          if [ -f "frontend/build/app/outputs/flutter-apk/app-release.apk" ]; then
            mv frontend/build/app/outputs/flutter-apk/app-release.apk \
               frontend/build/app/outputs/flutter-apk/fetchio-${VERSION}.apk
          else
            mv frontend/build/app/outputs/flutter-apk/app-debug.apk \
               frontend/build/app/outputs/flutter-apk/fetchio-${VERSION}.apk
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Fetchio ${{ steps.version.outputs.tag }}
          body: |
            ## Fetchio ${{ steps.version.outputs.tag }}

            ### What's new
            - **Fully standalone** — yt-dlp and ffmpeg run **on-device**, no backend server required.
            - Downloads are saved to the device Downloads / Gallery automatically.
            - Supports Android 7.0 (API 24) and above.

            ### Installation
            1. Download `fetchio-*.apk` below
            2. On your Android device, enable **Install unknown apps** for your browser or file manager
            3. Open the downloaded APK and tap **Install**

            ### Notes
            - The APK includes yt-dlp and ffmpeg binaries for arm64-v8a, armeabi-v7a, and x86_64.
            - A universal APK (all ABIs) and per-ABI APKs are attached below.
            - First launch extracts the binaries automatically — expect a brief delay.
          files: frontend/build/app/outputs/flutter-apk/fetchio-*.apk
          draft: false
          prerelease: false
